<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>client</title>
  </head>
  <body>
    <div
      id="wipe-overlay"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 0;
        pointer-events: none;
        z-index: 9999;
        overflow: hidden;
      "
    >
      <div
        id="wipe-fill"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"
      ></div>
      <div
        id="wipe-line"
        style="
          position: absolute;
          left: 0;
          bottom: -1px;
          width: 100%;
          height: 2px;
        "
      ></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
